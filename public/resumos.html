<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121214">
    <title>Resumos - Berbert Transcriptor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-content">
                <h1>Resumos <span id="app-version-display" class="version-badge"></span></h1>
                <p class="subtitle">Resumos gerados por Inteligência Artificial</p>
            </div>
        </header>

        <main class="app-content">
            <div id="loading" class="status-indicator recording">Carregando resumos...</div>
            <div id="resumos-list" class="history-list"></div>
        </main>

        <!-- Detail View (Initially Hidden via Transform) -->
        <div id="resumos-detail" class="history-detail">
            <header class="detail-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <button id="backToList" class="btn-icon">
                        <span>⬅️</span> Voltar
                    </button>
                    <div>
                        <button id="btnCopyResumo" class="btn-icon" style="padding: 6px 8px; margin-right: 10px; font-size: 1.2rem;" title="Copiar Resumo">📋</button>
                        <button id="btnEditResumo" class="btn secondary small" style="padding: 6px 12px; margin-right: 5px; font-size: 0.85rem;">✏️</button>
                        <button id="btnDeleteResumo" class="btn primary small" style="padding: 6px 12px; background: var(--danger-color); font-size: 0.85rem;">🗑️</button>
                    </div>
                </div>
                <h2 id="detail-title">Resumo</h2>
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
                    <span id="detail-date" class="detail-date"></span>
                    <span id="detail-badge" class="version-badge" style="background: var(--bg-dark); padding: 2px 6px; border-radius: 4px;"></span>
                </div>
            </header>
            
            <!-- Modo Visualização -->
            <div id="detail-content" class="detail-content transcription-box"></div>
            
            <!-- Modo Edição -->
            <div id="edit-content" class="detail-content transcription-box hidden" style="display: flex; flex-direction: column;">
                <textarea id="edit-textarea" style="flex: 1; width: 100%; background: transparent; color: var(--text-primary); border: none; font-size: 1rem; line-height: 1.6; resize: none; outline: none;"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btnCancelEdit" class="btn secondary">Cancelar</button>
                    <button id="btnSaveEdit" class="btn primary">Salvar Edição</button>
                </div>
            </div>
        </div>

        <nav class="app-bottom-tabs">
            <a href="index.html" class="tab-item">
                <span class="tab-icon">🎙️</span>
                <span class="tab-label">Gravar</span>
            </a>
            <a href="history.html" class="tab-item">
                <span class="tab-icon">📂</span>
                <span class="tab-label">Transcrições</span>
            </a>
            <a href="resumos.html" class="tab-item active">
                <span class="tab-icon">📝</span>
                <span class="tab-label">Resumos</span>
            </a>
        </nav>
    </div>
    <script src="version.js"></script>
    <script src="resumos.js"></script>
</body>
</html>
