<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121214">
    <title>Transcrições - PlauBert Note</title>

    <!-- SEO & Social Preview -->
    <meta name="description" content="App criado por Gustavo Berbert durante o evento StartSe para apoio a gravação das palestras">
    <meta property="og:title" content="Transcrições - PlauBert Note">
    <meta property="og:description" content="App criado por Gustavo Berbert durante o evento StartSe para apoio a gravação das palestras">
    <meta property="og:image" content="icon.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css?v=1.0.14">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-content">
                <h1>Transcrições <span id="app-version-display" class="version-badge"></span></h1>
                <div class="user-badge">
                    <span id="userEmailDisplay"></span>
                    <button class="btn-logout" onclick="logout()">Sair</button>
                </div>
            </div>
        </header>

        <main class="app-content">
            <div id="loading" class="status-indicator recording">Carregando reuniões...</div>
            <div id="history-list" class="history-list"></div>
        </main>

        <div id="history-detail" class="history-detail">
            <header class="detail-header">
                <button id="backToList" class="btn-icon">
                    <span>⬅️</span> Voltar
                </button>
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-top: 10px;">
                    <div>
                        <h2 id="detail-title" style="margin-bottom: 4px;">Reunião</h2>
                        <span id="detail-date" class="detail-date"></span>
                    </div>
                    <button id="btnCopyTranscription" class="btn-icon" style="font-size: 1.5rem; margin: 0; padding: 0;" title="Copiar texto">📋</button>
                </div>
            </header>
            
            <div class="detail-body" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;">
                <!-- Botão de Destaque -->
                <button id="btnOpenSummaryModal" class="btn primary" style="flex: none; width: 100%; padding: 16px; font-size: 1.1rem; box-shadow: 0 4px 20px rgba(130, 87, 229, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; border-radius: 16px; flex-shrink: 0;">
                    <span style="font-size: 1.4rem;">✨</span> 
                    <span>Gerar Resumo com IA</span>
                </button>
                
                <!-- Container Principal: Texto na Esquerda, Timeline na Direita -->
                <div class="transcription-layout" style="display: flex; gap: 15px; width: 100%; position: relative;">
                    <!-- Caixa da Transcrição -->
                    <div id="detail-content" class="transcription-box" style="margin: 0; flex: 1; position: relative; z-index: 1;"></div>
                    
                    <!-- Barra Lateral de Fotos (Timeline) -->
                    <div id="detail-photos-container" class="timeline-sidebar hidden" style="width: 80px; flex-shrink: 0; display: flex; flex-direction: column; position: relative;">
                        <!-- O Javascript inserirá as fotos aqui com margin-top proporcional -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Summary Generation Modal (Hidden by default) -->
        <div id="summaryModal" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Gerar Resumo</h3>
                    <button id="btnCloseSummaryModal" class="btn-icon">❌</button>
                </div>
                <div class="modal-body">
                    <label for="summaryType">Tipo de Transcrição:</label>
                    <select id="summaryType" class="form-input">
                        <option value="Reunião">Reunião (Ata e Decisões)</option>
                        <option value="Palestra">Palestra (Ideias Centrais)</option>
                    </select>
                    
                    <label for="summaryPrompt" style="margin-top: 15px; display: block;">Instruções Extras (Opcional):</label>
                    <textarea id="summaryPrompt" class="form-input" rows="3" placeholder="Ex: Seja formal, foque nas datas citadas..."></textarea>
                    
                    <button id="btnSubmitSummary" class="btn primary" style="width: 100%; margin-top: 20px;">Gerar e Salvar</button>
                    <p id="summaryLoadingText" class="status-text hidden" style="margin-top: 10px;">Enviando para IA... Pode levar alguns segundos.</p>
                </div>
            </div>
        </div>

        <!-- Media View Modal (Fotos e Notas) -->
        <div id="mediaModal" class="modal-overlay hidden" style="background: rgba(0,0,0,0.9);">
            <div style="position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100;">
                <button id="btnShareMedia" class="btn-icon" style="color: white; background: rgba(30,30,30,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                </button>
                <button id="btnCloseMediaModal" class="btn-icon" style="color: white; background: rgba(30,30,30,0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="mediaModalContent" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none;">
                <!-- O conteúdo (img ou div) será injetado aqui -->
            </div>
        </div>

        <nav class="app-bottom-tabs">
            <a href="index.html" class="tab-item">
                <span class="tab-icon">🎙️</span>
                <span class="tab-label">Gravar</span>
            </a>
            <a href="history.html" class="tab-item active">
                <span class="tab-icon">📂</span>
                <span class="tab-label">Transcrições</span>
            </a>
            <a href="resumos.html" class="tab-item">
                <span class="tab-icon">📝</span>
                <span class="tab-label">Resumos</span>
            </a>
        </nav>
    </div>
    <script src="version.js?v=1.0.14"></script>
    <script src="auth-helper.js?v=1.0.14"></script>
    <script src="history.js?v=1.0.14"></script>
</body>
</html>
