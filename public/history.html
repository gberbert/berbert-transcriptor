<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121214">
    <title>Histórico - Berbert Transcriptor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.png" type="image/png">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-content">
                <h1>Histórico <span id="app-version-display" class="version-badge"></span></h1>
                <p class="subtitle">Suas reuniões salvas na nuvem</p>
            </div>
        </header>

        <main class="app-content">
            <div id="loading" class="status-indicator recording">Carregando reuniões...</div>
            <div id="history-list" class="history-list"></div>
        </main>

        <!-- Detail View (Initially Hidden) -->
        <div id="history-detail" class="history-detail hidden">
            <header class="detail-header">
                <button id="backToList" class="btn-icon">
                    <span>⬅️</span> Voltar
                </button>
                <h2 id="detail-title">Reunião</h2>
                <span id="detail-date" class="detail-date"></span>
            </header>
            <div id="detail-content" class="detail-content transcription-box"></div>
        </div>

        <nav class="app-bottom-tabs">
            <a href="index.html" class="tab-item">
                <span class="tab-icon">🎙️</span>
                <span class="tab-label">Gravar</span>
            </a>
            <a href="history.html" class="tab-item active">
                <span class="tab-icon">📂</span>
                <span class="tab-label">Histórico</span>
            </a>
        </nav>
    </div>
    <script src="version.js"></script>
    <script src="history.js"></script>
</body>
</html>
